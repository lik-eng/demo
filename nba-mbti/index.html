<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0F">
  <meta name="description" content="NBA球星MBTI人格测试 —— 用20道题找出与你性格最匹配的NBA传奇球星 · 33位巨星覆盖全部16种人格">
  <meta property="og:title" content="NBA STAR MBTI — 你是哪位NBA传奇？">
  <meta property="og:description" content="完成测试，找到你的NBA灵魂搭档。分享给你的朋友！">
  <title>NBA STAR MBTI — 你是哪位NBA传奇？</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== 首页 ========== -->
  <section id="landing" class="section">
    <div class="landing__bg"></div>
    <div class="landing__court-lines"></div>

    <div class="landing__content">
      <div class="landing__hex-group">
        <div class="hex hex--left"></div>
        <div class="hex hex--right"></div>
      </div>

      <div class="landing__badge">NBA × MBTI</div>

      <h1 class="landing__title">
        <span class="title-line">你是哪位</span>
        <span class="title-line title-line--gold">NBA传奇</span>
        <span class="title-line">球星？</span>
      </h1>

      <p class="landing__subtitle">人格测试</p>

      <div class="landing__divider">
        <span class="divider__line"></span>
        <span class="divider__diamond"></span>
        <span class="divider__line"></span>
      </div>

      <button id="btn-start" class="btn btn--start" onclick="startTest()">
        <span class="btn__text">开始测试</span>
        <span class="btn__glow"></span>
      </button>

      <p class="landing__meta">20 道题目 · 33 位NBA传奇 · 1 个结果</p>
    </div>
  </section>

  <!-- ========== 测试页 ========== -->
  <section id="test" class="section hidden">
    <div class="test__container">

      <!-- 进度条 -->
      <div class="progress">
        <div class="progress__info">
          <span class="progress__label">题目进度</span>
          <span class="progress__count" id="progress-count">1 / 20</span>
        </div>
        <div class="progress__track">
          <div class="progress__fill" id="progress-fill" style="width: 5%;"></div>
        </div>
      </div>

      <!-- 题目卡片 -->
      <div class="question-card" id="question-card">
        <div class="question-card__dimension" id="question-dimension">外向 vs 内向</div>
        <div class="question-card__number" id="question-number">Q1</div>
        <p class="question-card__text" id="question-text">加载中...</p>

        <div class="question-card__answers">
          <button class="answer-btn" id="answer-a" onclick="handleAnswer('A')">
            <span class="answer-btn__label">A</span>
            <span class="answer-btn__text" id="answer-text-a"></span>
          </button>
          <button class="answer-btn" id="answer-b" onclick="handleAnswer('B')">
            <span class="answer-btn__label">B</span>
            <span class="answer-btn__text" id="answer-text-b"></span>
          </button>
        </div>
      </div>

      <!-- 导航 -->
      <div class="test__nav">
        <button class="btn btn--nav" id="btn-prev" onclick="previousQuestion()" disabled>
          ← 上一题
        </button>
        <button class="btn btn--quit" onclick="quitTest()">✕ 退出</button>
      </div>
    </div>
  </section>

  <!-- ========== 结果页 ========== -->
  <section id="results" class="section hidden">
    <div class="results__container">

      <!-- 标题区 -->
      <div class="results__header">
        <h2 class="results__title">你的NBA最佳匹配</h2>
        <div class="results__mbti-badge" id="result-mbti-badge">ENTJ</div>
      </div>

      <!-- 最佳匹配主卡片 -->
      <div class="player-card player-card--primary card-animate" id="primary-card">
        <div class="player-card__inner">
          <!-- 图片区 -->
          <div class="player-card__image-wrap">
            <img class="player-card__img" id="primary-img" src="" alt=""
                 onerror="handleImageError(this, 'primary')">
            <div class="player-card__img-fallback hidden" id="primary-fallback"></div>
            <div class="player-card__rating-badge" id="primary-rating">99</div>
          </div>

          <!-- 信息区 -->
          <div class="player-card__info">
            <div class="player-card__name-block">
              <h3 class="player-card__name" id="primary-name"></h3>
              <p class="player-card__nickname" id="primary-nickname"></p>
            </div>

            <div class="player-card__meta">
              <span class="meta-tag" id="primary-team"></span>
              <span class="meta-tag" id="primary-position"></span>
              <span class="meta-tag meta-tag--mbti" id="primary-mbti"></span>
            </div>

            <!-- 匹配度环形图 -->
            <div class="match-ring-wrap">
              <div class="match-ring" id="primary-ring">
                <div class="match-ring__value" id="primary-percent">0%</div>
              </div>
              <span class="match-ring__label">匹配度</span>
            </div>
          </div>

          <!-- 描述 & 特质 & 雷达图 -->
          <div class="player-card__details">
            <p class="player-card__desc" id="primary-desc"></p>

            <div class="player-card__traits" id="primary-traits"></div>

            <!-- 六维雷达图 -->
            <div class="radar-wrap">
              <h4 class="radar__title">🏀 能力雷达图</h4>
              <canvas class="radar-canvas" id="primary-radar" width="300" height="300"></canvas>
            </div>

            <div class="player-card__bars" id="primary-strengths"></div>

            <div class="player-card__extra">
              <div class="extra-item">
                <span class="extra-item__label">招牌动作</span>
                <span class="extra-item__value" id="primary-move"></span>
              </div>
              <div class="extra-item">
                <span class="extra-item__label">荣誉成就</span>
                <span class="extra-item__value" id="primary-accolades"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 第二、第三匹配卡片 -->
      <div class="results__secondary" id="secondary-cards">
        <!-- JS 填充 -->
      </div>

      <!-- MBTI 维度分析 -->
      <div class="results__breakdown">
        <h3 class="breakdown__title">你的人格维度分析</h3>
        <div class="breakdown__dims" id="dimension-breakdown">
          <!-- JS 填充 -->
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="results__actions">
        <button class="btn btn--action" onclick="retakeTest()">🔄 重新测试</button>
        <button class="btn btn--action" onclick="shareResult()">📋 分享结果</button>
        <button class="btn btn--action" id="btn-allstars" onclick="toggleAllStars()">
          📊 查看全部排名
        </button>
      </div>

      <!-- 全部33位球星排名（可折叠） -->
      <div class="results__allstars hidden" id="allstars-grid">
        <h3 class="allstars__title">全部33位NBA传奇 —— 你的匹配排名</h3>
        <div class="allstars__grid" id="allstars-content">
          <!-- JS 填充 -->
        </div>
      </div>

    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/test.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
